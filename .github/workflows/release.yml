name: Release

# Build ABI3 wheels for every supported platform and publish to PyPI.
#
# In addition to the abi3 wheels (one per platform, covering all
# GIL-enabled CPython >= 3.9), the `*-freethreaded` jobs build
# version-specific cp313t/cp314t wheels: the free-threaded build has no
# limited API, so abi3 cannot cover it.
#
# Triggers:
# * Tag push matching `v*` (e.g. `v2.1.1`) — the normal release path.
# * Manual `workflow_dispatch` — for re-running against the current
#   `main` (useful once, to publish an existing tag whose workflow
#   file didn't exist when the tag was pushed).
#
# Requires the `PYPI_API_TOKEN` repository secret (PyPI account →
# API tokens → "Entire account" scope for the first publish, then
# rotate to a project-scoped token after the project exists).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  linux-freethreaded:
    name: Linux free-threaded ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      # Install free-threaded interpreters on the runner; maturin-action
      # mounts the toolcache into the manylinux container, where the
      # container's own /opt/python interpreters don't include -t builds.
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.13t
            3.14t
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.13t -i python3.14t
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-freethreaded-${{ matrix.target }}
          path: dist

  macos:
    name: macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  macos-freethreaded:
    name: macOS free-threaded ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.13t
            3.14t
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.13t -i python3.14t
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-freethreaded-${{ matrix.target }}
          path: dist

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  windows-freethreaded:
    name: Windows x64 free-threaded
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.13t
            3.14t
          architecture: x64
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist -i python3.13t -i python3.14t
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-freethreaded-x64
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      [
        linux,
        linux-freethreaded,
        macos,
        macos-freethreaded,
        windows,
        windows-freethreaded,
        sdist,
      ]
    # Only publish on tag push or an explicit manual dispatch — never
    # from a normal branch push.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -lh dist/
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          # `--skip-existing` lets re-runs of this workflow be safe:
          # already-published (name, version, filetype) triples are
          # left alone rather than erroring out.
          args: --non-interactive --skip-existing dist/*
