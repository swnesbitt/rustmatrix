# Read the Docs build configuration for rustmatrix.
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    rust: "1.82"
  jobs:
    post_install:
      - pip install -e ".[docs]"
      - pip install "maturin>=1.5,<2.0"
      - maturin develop --release

sphinx:
  configuration: docs/conf.py
  builder: html
  fail_on_warning: false

formats:
  - htmlzip
